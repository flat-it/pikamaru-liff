<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="env.js"></script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body { margin:0; font-family:sans-serif; background:#e5ddd5; height:100vh; display:flex; flex-direction:column;}
#app { flex:1; display:flex; flex-direction:column;}
.card { background:#fff; margin:5px; padding:10px; border-radius:10px;}

#detail { background:#fff; padding:10px; border-bottom:1px solid #ccc;}
#chat { flex:1; overflow:auto; padding:10px;}
.msg { max-width:70%; padding:8px; margin:5px; border-radius:10px;}
.me { background:#dcf8c6; margin-left:auto;}
.other { background:#fff;}

#input { display:flex; border-top:1px solid #ccc;}
#input input { flex:1; padding:10px;}
</style>
</head>

<body>
<div id="app"></div>

<script>

const API = ENV.API_BASE;

let state = {
  lineId:null,
  reservations:[],
  selected:null,
  messages:[]
};

// ================= 初期化 =================
async function init(){
  await liff.init({ liffId: ENV.LIFF_ID });

  if(!liff.isLoggedIn()){
    liff.login();
    return;
  }

  const profile = await liff.getProfile();
  state.lineId = profile.userId;

  checkVisit();
}

// ================= 初回判定 =================
async function checkVisit(){
  const res = await fetch(API,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({action:"check_visit",lineId:state.lineId})
  });

  const data = await res.json();

  if(data.isFirstVisit){
    location.href="form.html";
  } else {
    loadMyPage();
  }
}

// ================= マイページ =================
async function loadMyPage(){
  const res = await fetch(API,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({action:"get_myPage",lineId:state.lineId})
  });

  const data = await res.json();
  state.reservations = data.items || [];

  renderMyPage();
}

// ================= 一覧表示 =================
function renderMyPage(){

  let html="<h3 style='padding:10px;'>予約一覧</h3>";

  state.reservations.forEach(r=>{
    html+=`
      <div class="card">
        第1希望：${r.date1}<br>
        状態：${r.status || "未確定"}<br>

        <button onclick="goDetail('${r.reserveid}')">詳細</button>
        <button onclick="goReReserve('${r.reserveid}')">再予約</button>
      </div>
    `;
  });

  html+=`<button onclick="goForm()">新規予約</button>`;

  document.getElementById("app").innerHTML=html;
}

// ================= 詳細 =================
async function goDetail(id){

  const res = await fetch(API,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      action:"get_reserve_detail",
      lineId:state.lineId,
      reserveid:id
    })
  });

  const data = await res.json();

  state.selected=data.reserve;
  state.messages=data.messages;

  renderDetailChat();
}

// ================= 再予約 =================
function goReReserve(id){
  location.href = `form.html?mode=re&reserveid=${id}`;
}

// ================= 新規予約 =================
function goForm(){
  location.href="form.html?mode=new";
}

// ================= 詳細＋チャット =================
function renderDetailChat(){

  let html=`
    <div id="detail">
      <b>${state.selected.name}</b><br>
      ${state.selected.request_1}<br>
      状態：${state.selected.status}<br>

      <button onclick="loadMyPage()">戻る</button>
    </div>

    <div id="chat">
  `;

  (state.messages || []).forEach(m=>{
    html+=`<div class="msg ${m.sender==="user"?"me":"other"}">${m.message}</div>`;
  });

  html+=`
    </div>

    <div id="input">
      <input id="msgInput">
      <button onclick="sendMsg()">送信</button>
    </div>
  `;

  document.getElementById("app").innerHTML=html;

  scrollBottom();
}

// ================= メッセージ送信 =================
async function sendMsg(){

  const text=document.getElementById("msgInput").value;

  if(!text) return;

  await fetch(API,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      action:"send_message",
      lineId:state.lineId,
      reserveid:state.selected.reserveid,
      message:text
    })
  });

  document.getElementById("msgInput").value="";

  goDetail(state.selected.reserveid);
}

// ================= スクロール =================
function scrollBottom(){
  const el=document.getElementById("chat");
  el.scrollTop=el.scrollHeight;
}

init();

</script>
</body>
</html>
