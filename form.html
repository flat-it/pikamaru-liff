<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="env.js"></script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body { margin:0; font-family:sans-serif; background:#e5ddd5; }

#chat { padding:10px; height:60vh; overflow-y:auto; }

.message { max-width:75%; margin:10px; padding:12px; border-radius:10px; }
.bot { background:#fff; }
.user { background:#dcf8c6; margin-left:auto; }

.btn {
  display:block;
  margin:8px 0;
  padding:15px;
  font-size:16px;
  background:#4CAF50;
  color:white;
  border:none;
  border-radius:8px;
}

.btn.selected { background:#ff9800; }

/* フォーム */
#formArea {
  display:none;
  padding:15px;
  background:#fff;
}

#formArea input, textarea {
  width:100%;
  padding:10px;
  margin:5px 0;
}
</style>
</head>

<body>

<div id="chat"></div>

<div id="formArea"></div>

<script>

// ================= 状態 =================
let userId="";
let userData={};
let makerData=[];
let calendarSlots=[];
let selectedDates=[];

// ================= API =================
async function callAPI(action, body={}){
  const res = await fetch(ENV.API_BASE,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({action,...body})
  });
  return await res.json();
}

// ================= 初期化 =================
async function init(){

  await liff.init({ liffId: ENV.LIFF_ID });

  if(!liff.isLoggedIn()){
    liff.login();
    return;
  }

  const profile = await liff.getProfile();
  userId = profile.userId;

  const maker = await callAPI("check_maker");
  makerData = maker.items;

  ask("こんにちは！予約を開始します");
  ask("お名前を教えてください");

  step=1;
}

// ================= UI =================
function addMessage(text,type="bot"){
  const div=document.createElement("div");
  div.className="message "+type;
  div.innerText=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function ask(text){
  setTimeout(()=>addMessage(text),300);
}

function showButtons(list,callback){
  const div=document.createElement("div");
  div.className="message bot";

  list.forEach(v=>{
    const b=document.createElement("button");
    b.className="btn";
    b.innerText=v;

    b.onclick=()=>{
      addMessage(v,"user");
      callback(v);
    };

    div.appendChild(b);
  });

  chat.appendChild(div);
}

// ================= ステップ =================
let step=0;

function handle(val){

switch(step){

case 1:
  userData.name=val;
  ask("お住まいの都道府県はどこですか？");
  showButtons(["東京","神奈川","千葉","埼玉","静岡","愛知"],v=>handle(v));
  step=2;
  break;

case 2:
  userData.pref=val;
  ask("ご利用の洗濯機メーカーはどこですか？");

  const makers=[...new Set(makerData.map(m=>m.maker))];
  showButtons(makers,v=>handle(v));

  step=3;
  break;

case 3:
  userData.maker=val;

  const patterns = makerData.filter(m=>m.maker===val);

  ask("型パターンを選択してください");

  showButtons(patterns.map(p=>p.pattern),v=>{
    const m=patterns.find(x=>x.pattern===v);
    userData.type=m.type;

    ask("型番を入力してください（任意）");
    step=4;
  });

  break;

case 4:
  userData.model=val;
  fetchShops();
  step=5;
  break;

}
}

// ================= 加盟店 =================
async function fetchShops(){

  ask("加盟店を検索しています");

  const data = await callAPI("get_franchise",{
    prefecture:userData.pref,
    type:userData.type
  });

  if(!data.items || data.items.length===0){
    ask("申し訳ありませんが対応可能な加盟店がありません。");
    return;
  }

  ask("ご希望の加盟店を選択してください");

  showButtons(data.items.map(x=>x.name),v=>{
    const shop=data.items.find(x=>x.name===v);
    userData.shop=shop.name;
    userData.franchise_id=shop.franchise_id;

    fetchCalendar();
  });
}

// ================= カレンダー =================
async function fetchCalendar(){

  ask("空き枠を取得しています");

  const data = await callAPI("get_calendar",{
    franchise_id:userData.franchise_id
  });

  calendarSlots=data.date;

  ask("希望日時を3つ選択してください（優先順）");

  const div=document.createElement("div");
  div.className="message bot";

  calendarSlots.forEach(slot=>{
    const b=document.createElement("button");
    b.className="btn";
    b.innerText=slot;

    b.onclick=()=>{
      if(selectedDates.length>=3) return;

      selectedDates.push(slot);
      b.classList.add("selected");

      if(selectedDates.length===3){
        userData.date1=selectedDates[0];
        userData.date2=selectedDates[1];
        userData.date3=selectedDates[2];

        showForm(); // ★ここが重要
      }
    };

    div.appendChild(b);
  });

  chat.appendChild(div);
}

// ================= フォーム表示 =================
function showForm(){

  ask("詳細情報を入力してください");

  formArea.style.display="block";

  formArea.innerHTML=`
    郵便番号<input id="postcode">
    住所<input id="address">
    電話番号<input id="tel">
    メール<input id="email">
    症状<textarea id="symptoms"></textarea>

    <button class="btn" onclick="submit()">予約する</button>
  `;
}

// ================= 送信 =================
async function submit(){

  const data = await callAPI("submit_reserve",{
    lineId:userId,
    name:userData.name,
    postcode:postcode.value,
    address:address.value,
    tel:tel.value,
    email:email.value,
    symptoms:symptoms.value,
    franchise_id:userData.franchise_id,
    model_type:userData.type,
    request1:userData.date1,
    request2:userData.date2,
    request3:userData.date3
  });

  if(data.result==="success"){
    ask("予約が完了しました！");
  }else{
    ask("予約に失敗しました");
  }
}

// ================= 入力 =================
document.body.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    const input=document.getElementById("input");
    if(input){
      const val=input.value;
      if(val){
        addMessage(val,"user");
        input.value="";
        handle(val);
      }
    }
  }
});

init();

</script>

</body>
</html>
