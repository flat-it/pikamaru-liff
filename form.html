<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ピカまる本舗 予約フォーム</title>
<script src="env.js"></script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');

  :root {
    --primary: #00B900;
    --primary-dark: #009900;
    --primary-light: #e8f9e8;
    --bg: #f0f2f5;
    --white: #ffffff;
    --text: #1a1a1a;
    --text-muted: #888;
    --border: #e0e0e0;
    --bubble-bot: #ffffff;
    --bubble-user: #c8f7a0;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ===== ヘッダー ===== */
  #header {
    background: var(--primary);
    color: white;
    padding: 14px 16px;
    flex-shrink: 0;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }
  #header h1 { font-size: 17px; font-weight: 700; }
  #header p { font-size: 12px; opacity: 0.85; margin-top: 2px; }

  /* ===== プログレスバー ===== */
  #progress-bar {
    background: var(--primary-dark);
    height: 4px;
    flex-shrink: 0;
  }
  #progress-fill {
    height: 100%;
    background: white;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* ===== チャット エリア ===== */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 12px 12px 8px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .bubble {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.6;
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

  .bubble.bot {
    background: var(--bubble-bot);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
    box-shadow: var(--shadow);
    color: var(--text);
  }
  .bubble.user {
    background: var(--bubble-user);
    align-self: flex-end;
    border-bottom-right-radius: 4px;
    color: var(--text);
  }

  /* ===== ボタン群 ===== */
  .btn-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-self: flex-start;
    width: 100%;
    max-width: 300px;
    animation: fadeIn 0.25s ease;
  }

  .choice-btn {
    background: var(--white);
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 14px;
    font-family: inherit;
    font-weight: 500;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text);
  }
  .choice-btn:hover, .choice-btn:active {
    border-color: var(--primary);
    background: var(--primary-light);
    color: var(--primary-dark);
  }
  .choice-btn.selected {
    border-color: var(--primary);
    background: var(--primary-light);
    color: var(--primary-dark);
  }
  .choice-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* 日程選択ボタン */
  .slot-btn {
    background: var(--white);
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text);
    position: relative;
  }
  .slot-btn .slot-num {
    display: inline-block;
    background: var(--primary);
    color: white;
    font-size: 10px;
    font-weight: 700;
    border-radius: 50%;
    width: 18px; height: 18px;
    text-align: center;
    line-height: 18px;
    margin-right: 6px;
  }
  .slot-btn.selected-1 { border-color: var(--primary); background: var(--primary-light); }
  .slot-btn.selected-2 { border-color: #2196f3; background: #e3f2fd; }
  .slot-btn.selected-3 { border-color: #ff9800; background: #fff8e1; }
  .slot-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ===== 入力フォーム ===== */
  .input-form {
    background: var(--white);
    border-radius: var(--radius);
    padding: 14px;
    box-shadow: var(--shadow);
    align-self: stretch;
    animation: fadeIn 0.25s ease;
  }
  .input-form .form-field {
    margin-bottom: 12px;
  }
  .input-form label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .input-form label .required {
    color: #f44336;
    margin-left: 3px;
  }
  .input-form input,
  .input-form textarea,
  .input-form select {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
    color: var(--text);
    background: white;
  }
  .input-form input:focus,
  .input-form textarea:focus { border-color: var(--primary); }
  .input-form textarea { resize: none; height: 72px; }

  /* ===== 送信ボタン ===== */
  .submit-btn {
    width: 100%;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 16px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 4px;
  }
  .submit-btn:active { background: var(--primary-dark); }
  .submit-btn:disabled { background: #ccc; cursor: not-allowed; }

  /* ===== ローディングドット ===== */
  .typing {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 10px 14px;
    background: var(--bubble-bot);
    border-radius: 14px;
    border-bottom-left-radius: 4px;
    align-self: flex-start;
    box-shadow: var(--shadow);
  }
  .typing span {
    width: 7px; height: 7px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* ===== 完了画面 ===== */
  #complete {
    display: none;
    flex: 1;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 32px;
    text-align: center;
  }
  #complete .check-icon {
    width: 72px; height: 72px;
    background: var(--primary);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    color: white;
    animation: popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
  }
  @keyframes popIn { from { transform:scale(0); } to { transform:scale(1); } }
  #complete h2 { font-size: 20px; color: var(--text); }
  #complete p { font-size: 14px; color: var(--text-muted); line-height: 1.7; }
  #complete .back-link {
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 12px 28px;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    margin-top: 8px;
  }

  /* ===== 料金シミュレーション ===== */
  .price-sim {
    background: var(--white);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow);
    align-self: stretch;
    animation: fadeIn 0.25s ease;
  }
  .price-sim h3 {
    font-size: 14px;
    font-weight: 700;
    color: var(--primary-dark);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--primary-light);
  }
  .price-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    font-size: 13px;
    border-bottom: 1px solid #f0f0f0;
  }
  .price-row:last-of-type { border-bottom: none; }
  .price-row .label { color: var(--text); flex: 1; }
  .price-row .amount { font-weight: 700; color: var(--text); white-space: nowrap; margin-left: 8px; }
  .price-row.total {
    margin-top: 8px;
    padding-top: 10px;
    border-top: 2px solid var(--border);
    font-size: 15px;
  }
  .price-row.total .label { font-weight: 700; color: var(--text); }
  .price-row.total .amount { color: var(--primary-dark); font-size: 18px; }
  .price-option-group {
    margin: 10px 0 4px;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .price-checkbox-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 0;
    font-size: 13px;
    border-bottom: 1px solid #f5f5f5;
    cursor: pointer;
  }
  .price-checkbox-row input[type=checkbox] {
    width: 16px; height: 16px;
    accent-color: var(--primary);
    flex-shrink: 0;
    cursor: pointer;
  }
  .price-checkbox-row .opt-label { flex: 1; color: var(--text); }
  .price-checkbox-row .opt-amount { font-weight: 700; color: #555; white-space: nowrap; }
  .price-note {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
    line-height: 1.5;
  }
  .price-tax-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* ===== エラートースト ===== */
  #toast {
    position: fixed;
    bottom: 20px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #323232;
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="header">
  <h1>🧺 洗濯機クリーニング予約</h1>
  <p>ピカまる本舗</p>
</div>
<div id="progress-bar"><div id="progress-fill"></div></div>

<div id="chat"></div>
<div id="complete">
  <div class="check-icon">✓</div>
  <h2>予約を受け付けました！</h2>
  <p>加盟店が内容を確認後、<br>日程を調整してご連絡します。</p>
  <button class="back-link" onclick="location.href='index.html'">マイページへ</button>
</div>

<div id="toast"></div>

<script>
// ===== 状態 =====
const state = {
  lineId: null,
  step: 0,
  userData: {
    // check_maker から
    makerData: [],
    // 選択値
    maker: null,
    type: null,       // 縦 or ドラム（Logic Apps: model_type）
    model_number: '',
    // get_franchise から
    franchiseList: [],
    prefecture: null,
    franchise_id: null,
    franchise_name: null,
    franchise_lineid: null,
    // get_calendar から
    calendarSlots: [],
    selectedDates: [],
    // フォーム入力
    used: '',
    symptoms: '',
    name: '',
    postcode: '',
    address: '',
    tel: '',
    email: '',
    parking: ''
  }
};

// 総ステップ数（プログレスバー用）
const TOTAL_STEPS = 10;

// ===== API =====
async function callAPI(body) {
  try {
    const res = await fetch(ENV.API_BASE, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch (e) {
    showToast('通信エラーが発生しました');
    return null;
  }
}

// ===== 初期化 =====
async function init() {
  await liff.init({ liffId: ENV.LIFF_ID });
  if (!liff.isLoggedIn()) { liff.login(); return; }

  const profile = await liff.getProfile();
  state.lineId = profile.userId;

  // 洗濯機分類マスタ取得（check_maker）
  showTyping();
  const makerRes = await callAPI({ action: 'check_maker', lineId: state.lineId });
  removeTyping();

  if (!makerRes || !makerRes.items) {
    addBubble('bot', 'データの読み込みに失敗しました。しばらく後にお試しください。');
    return;
  }
  state.userData.makerData = makerRes.items; // [{pattern, maker, type}]

  addBubble('bot', 'こんにちは！洗濯機クリーニングのご予約を承ります😊');
  await delay(400);
  stepAskMachineType();
}

// ===== Step 1: 洗濯機の種類 =====
function stepAskMachineType() {
  setProgress(1);
  addBubble('bot', '洗濯機の種類を教えてください。');

  const types = [...new Set(state.userData.makerData.map(m => m.type))].filter(Boolean);
  // 型名が「縦」「ドラム」等に対応
  const labels = { '縦': '縦型洗濯機', 'ドラム': 'ドラム式洗濯機' };

  addButtons(types.map(t => ({ label: labels[t] || t, value: t })), (val) => {
    state.userData.type = val;
    addBubble('user', labels[val] || val);
    stepAskMaker();
  });
}

// ===== Step 2: メーカー選択 =====
function stepAskMaker() {
  setProgress(2);
  addBubble('bot', 'メーカーを選択してください。');

  const filtered = state.userData.makerData.filter(m => m.type === state.userData.type);
  const makers = [...new Set(filtered.map(m => m.maker))].filter(Boolean);

  addButtons(makers.map(m => ({ label: m, value: m })), (val) => {
    state.userData.maker = val;
    addBubble('user', val);
    stepAskModelNumber();
  });
}

// ===== Step 3: 型番入力 =====
function stepAskModelNumber() {
  setProgress(3);
  addBubble('bot', '型番を入力してください。\n（わからない場合は「わからない」と入力してください）');
  addTextInput('例：AQW-VX12P', false, (val) => {
    state.userData.model_number = val === 'わからない' ? '' : val;
    addBubble('user', val);
    stepShowPriceSimulation();
  });
}

// ===== Step 3.5: 料金シミュレーション =====
function stepShowPriceSimulation() {
  setProgress(3);
  addBubble('bot', '料金シミュレーションをご確認ください。\nオプションを選択すると合計金額が変わります。');

  const isDoram = state.userData.type === 'ドラム';
  const baseFee = isDoram ? 25000 : 15000;

  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = 'price-sim';

  // --- オプション定義 ---
  const mandatoryOptions = isDoram ? [] : [
    { id: 'opt_8kg',    label: '8キロ以上',       amount: 3000 },
    { id: 'opt_hitachi', label: '日立製品',        amount: 3000 },
    { id: 'opt_dryer',  label: '乾燥機能付き',     amount: 5000 },
    { id: 'opt_hitachi_special', label: '日立製特殊', amount: 5000 },
  ];
  const dryOptions = isDoram ? [
    { id: 'opt_dry', label: '乾燥ダクト・ヒートポンプ洗浄（Panasonic製 / AQUA / アイリスオーヤマ / 日立 / 東芝 / SHARP）', amount: 10000 }
  ] : [];
  const drainOptions = [
    { id: 'opt_drain', label: '排水経路・排水口・防水パン・洗濯機周辺', amount: 3000 }
  ];
  const liftOptions = [
    { id: 'opt_lift',      label: '嵩上げ（工賃のみ）',  amount: 3000 },
    { id: 'opt_lift_parts', label: '嵩上げ部材込み',      amount: 5000 }
  ];

  // 状態管理
  const selectedOptions = {};

  function calcTotal() {
    let total = baseFee;
    Object.values(selectedOptions).forEach(v => { if (v) total += v; });
    return total;
  }

  function renderPriceRows() {
    const rows = wrap.querySelectorAll('.price-row');
    rows.forEach(r => r.remove());
    const totalRow = wrap.querySelector('.price-total-wrap');
    if (totalRow) totalRow.remove();

    const insertPoint = wrap.querySelector('.opt-section');

    // 基本料金行
    const baseRow = document.createElement('div');
    baseRow.className = 'price-row';
    const baseItems = isDoram
      ? '洗濯機内側・外側、ドラム槽、脱水槽、脱水槽カバー、循環経路'
      : '洗濯機内側・外側、ドラム槽、脱水槽';
    baseRow.innerHTML = `<span class="label">基本料金<br><small style="color:#999;font-weight:400">${baseItems}</small></span><span class="amount">¥${baseFee.toLocaleString()}</span>`;
    wrap.insertBefore(baseRow, insertPoint);

    const totalVal = calcTotal();
    const taxVal = Math.floor(totalVal * 0.1);
    const grandTotal = totalVal + taxVal;

    const totalWrap = document.createElement('div');
    totalWrap.className = 'price-total-wrap';
    totalWrap.innerHTML = `
      <div class="price-tax-row"><span>小計</span><span>¥${totalVal.toLocaleString()}</span></div>
      <div class="price-tax-row"><span>消費税（10%）</span><span>¥${taxVal.toLocaleString()}</span></div>
      <div class="price-row total"><span class="label">合計（税込）</span><span class="amount">¥${grandTotal.toLocaleString()}</span></div>
    `;
    wrap.insertBefore(totalWrap, wrap.querySelector('.price-confirm-btn'));
  }

  // ヘッダー
  const title = document.createElement('h3');
  title.textContent = `💰 料金シミュレーション（${isDoram ? 'ドラム式' : '縦型'}・分解洗浄）`;
  wrap.appendChild(title);

  // オプションセクション
  const optSection = document.createElement('div');
  optSection.className = 'opt-section';

  function addOptionGroup(label, options, mutuallyExclusive) {
    const groupLabel = document.createElement('div');
    groupLabel.className = 'price-option-group';
    groupLabel.textContent = label;
    optSection.appendChild(groupLabel);

    options.forEach(opt => {
      const row = document.createElement('label');
      row.className = 'price-checkbox-row';

      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.id = opt.id;

      cb.addEventListener('change', () => {
        if (mutuallyExclusive) {
          // 同グループは1つだけ選択
          options.forEach(o => {
            selectedOptions[o.id] = null;
            const el = optSection.querySelector(`#${o.id}`);
            if (el && el !== cb) el.checked = false;
          });
        }
        selectedOptions[opt.id] = cb.checked ? opt.amount : null;
        renderPriceRows();
      });

      row.appendChild(cb);
      row.innerHTML += `<span class="opt-label">${opt.label}</span><span class="opt-amount">+¥${opt.amount.toLocaleString()}</span>`;
      // Re-append cb since innerHTML reset
      const labelEl = row;
      labelEl.querySelector('input') || labelEl.prepend(cb);

      // Fix: rebuild properly
      const finalRow = document.createElement('label');
      finalRow.className = 'price-checkbox-row';
      finalRow.appendChild(cb);
      const labelSpan = document.createElement('span');
      labelSpan.className = 'opt-label';
      labelSpan.textContent = opt.label;
      const amtSpan = document.createElement('span');
      amtSpan.className = 'opt-amount';
      amtSpan.textContent = `+¥${opt.amount.toLocaleString()}`;
      finalRow.appendChild(labelSpan);
      finalRow.appendChild(amtSpan);

      selectedOptions[opt.id] = null;
      optSection.appendChild(finalRow);
      // Store reference to checkbox
      finalRow._cb = cb;
      // Re-listen
      cb.addEventListener('change', () => {}); // already attached above
    });
  }

  // 縦型のみ：必須オプション（1つ選択）
  if (!isDoram && mandatoryOptions.length > 0) {
    const groupLabel = document.createElement('div');
    groupLabel.className = 'price-option-group';
    groupLabel.textContent = '必須オプション（該当するものを選択）';
    const note = document.createElement('div');
    note.className = 'price-note';
    note.textContent = '※ご使用の洗濯機に合わせて選択してください（1つ選択）';
    optSection.appendChild(groupLabel);
    optSection.appendChild(note);

    mandatoryOptions.forEach(opt => {
      const finalRow = document.createElement('label');
      finalRow.className = 'price-checkbox-row';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.id = opt.id;
      cb.addEventListener('change', () => {
        mandatoryOptions.forEach(o => {
          selectedOptions[o.id] = null;
          const el = document.getElementById(o.id);
          if (el && el !== cb) el.checked = false;
        });
        selectedOptions[opt.id] = cb.checked ? opt.amount : null;
        renderPriceRows();
      });
      const labelSpan = document.createElement('span');
      labelSpan.className = 'opt-label';
      labelSpan.textContent = opt.label;
      const amtSpan = document.createElement('span');
      amtSpan.className = 'opt-amount';
      amtSpan.textContent = `+¥${opt.amount.toLocaleString()}`;
      finalRow.appendChild(cb);
      finalRow.appendChild(labelSpan);
      finalRow.appendChild(amtSpan);
      selectedOptions[opt.id] = null;
      optSection.appendChild(finalRow);
    });
  }

  // ドラムのみ：乾燥洗浄オプション
  if (isDoram && dryOptions.length > 0) {
    const groupLabel = document.createElement('div');
    groupLabel.className = 'price-option-group';
    groupLabel.textContent = '乾燥洗浄オプション';
    const note = document.createElement('div');
    note.className = 'price-note';
    note.textContent = '※乾燥機能でお悩みのお客様は基本料金にプラスして選択';
    optSection.appendChild(groupLabel);
    optSection.appendChild(note);
    dryOptions.forEach(opt => {
      const finalRow = document.createElement('label');
      finalRow.className = 'price-checkbox-row';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.id = opt.id;
      cb.addEventListener('change', () => {
        selectedOptions[opt.id] = cb.checked ? opt.amount : null;
        renderPriceRows();
      });
      const labelSpan = document.createElement('span');
      labelSpan.className = 'opt-label';
      labelSpan.textContent = opt.label;
      const amtSpan = document.createElement('span');
      amtSpan.className = 'opt-amount';
      amtSpan.textContent = `+¥${opt.amount.toLocaleString()}`;
      finalRow.appendChild(cb);
      finalRow.appendChild(labelSpan);
      finalRow.appendChild(amtSpan);
      selectedOptions[opt.id] = null;
      optSection.appendChild(finalRow);
    });
  }

  // 排水洗浄オプション（共通）
  {
    const groupLabel = document.createElement('div');
    groupLabel.className = 'price-option-group';
    groupLabel.textContent = '排水洗浄オプション';
    const note = document.createElement('div');
    note.className = 'price-note';
    note.textContent = '※臭い・排水詰まりのお客様は基本料金にプラスして選択';
    optSection.appendChild(groupLabel);
    optSection.appendChild(note);
    drainOptions.forEach(opt => {
      const finalRow = document.createElement('label');
      finalRow.className = 'price-checkbox-row';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.id = opt.id;
      cb.addEventListener('change', () => {
        selectedOptions[opt.id] = cb.checked ? opt.amount : null;
        renderPriceRows();
      });
      const labelSpan = document.createElement('span');
      labelSpan.className = 'opt-label';
      labelSpan.textContent = opt.label;
      const amtSpan = document.createElement('span');
      amtSpan.className = 'opt-amount';
      amtSpan.textContent = `+¥${opt.amount.toLocaleString()}`;
      finalRow.appendChild(cb);
      finalRow.appendChild(labelSpan);
      finalRow.appendChild(amtSpan);
      selectedOptions[opt.id] = null;
      optSection.appendChild(finalRow);
    });
  }

  // 住居オプション（共通・排他）
  {
    const groupLabel = document.createElement('div');
    groupLabel.className = 'price-option-group';
    groupLabel.textContent = '住居オプション';
    optSection.appendChild(groupLabel);
    liftOptions.forEach(opt => {
      const finalRow = document.createElement('label');
      finalRow.className = 'price-checkbox-row';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.id = opt.id;
      cb.addEventListener('change', () => {
        liftOptions.forEach(o => {
          selectedOptions[o.id] = null;
          const el = document.getElementById(o.id);
          if (el && el !== cb) el.checked = false;
        });
        selectedOptions[opt.id] = cb.checked ? opt.amount : null;
        renderPriceRows();
      });
      const labelSpan = document.createElement('span');
      labelSpan.className = 'opt-label';
      labelSpan.textContent = opt.label;
      const amtSpan = document.createElement('span');
      amtSpan.className = 'opt-amount';
      amtSpan.textContent = `+¥${opt.amount.toLocaleString()}`;
      finalRow.appendChild(cb);
      finalRow.appendChild(labelSpan);
      finalRow.appendChild(amtSpan);
      selectedOptions[opt.id] = null;
      optSection.appendChild(finalRow);
    });
  }

  wrap.appendChild(optSection);

  // 確認ボタン
  const confirmBtn = document.createElement('button');
  confirmBtn.className = 'submit-btn price-confirm-btn';
  confirmBtn.style.marginTop = '12px';
  confirmBtn.textContent = 'この内容で次へ →';
  confirmBtn.onclick = () => {
    // 選択内容を保存
    const totalVal = calcTotal();
    const taxVal = Math.floor(totalVal * 0.1);
    state.userData.estimatedPrice = totalVal + taxVal;
    state.userData.selectedPriceOptions = Object.entries(selectedOptions)
      .filter(([, v]) => v)
      .map(([k]) => k);

    wrap.querySelectorAll('input, button').forEach(el => el.disabled = true);

    const allOpts = [...mandatoryOptions, ...dryOptions, ...drainOptions, ...liftOptions];
    const chosenLabels = Object.entries(selectedOptions)
      .filter(([, v]) => v)
      .map(([k]) => allOpts.find(o => o.id === k)?.label)
      .filter(Boolean);

    const msg = `概算料金：¥${(totalVal + taxVal).toLocaleString()}（税込）` +
      (chosenLabels.length ? `\n選択オプション：${chosenLabels.join('、')}` : '\nオプションなし');
    addBubble('user', msg);
    stepAskUsedYears();
  };
  wrap.appendChild(confirmBtn);

  chat.appendChild(wrap);
  renderPriceRows();
  scrollBottom();
}

  addButtons([
    { label: '1年未満', value: '1年未満' },

    { label: '3〜5年', value: '3〜5年' },

// ===== Step 5: お悩み =====

// ===== Step 6: 都道府県 =====
function stepAskPrefecture() {
  setProgress(6);
  addBubble('bot', 'お住まいの都道府県を選択してください。');

  // 加盟店マスタから動的に都道府県を生成するのが理想だが、
  // get_franchise は prefecture + type が必要なため、よく使われる都道府県を表示
  // 本番は別途 prefecture_list API を追加することを推奨
  const prefs = ['茨城県','埼玉県','千葉県','東京都','神奈川県','静岡県','愛知県'];

  addScrollSelect(prefs, async (val) => {
    state.userData.prefecture = val;
    addBubble('user', val);

}

// ===== Step 7: 加盟店選択 =====
async function stepFetchFranchise() {
  setProgress(7);
  showTyping();

  const data = await callAPI({
    action: 'get_franchise',
    lineId: state.lineId,
    prefecture: state.userData.prefecture,
    type: state.userData.type
  });
  removeTyping();

  if (!data || !data.items || data.items.length === 0) {
    addBubble('bot', '申し訳ありません。ご指定のエリアに対応可能な加盟店が見つかりませんでした。\n別の都道府県をお試しください。');
    await delay(300);
    stepAskPrefecture();
    return;
  }

  state.userData.franchiseList = data.items;
  addBubble('bot', '対応可能な加盟店が見つかりました。ご希望の加盟店を選択してください。');

  addButtons(data.items.map(s => ({
    label: s.name,
    value: s.franchise_id,
    sub: s.address
  })), async (val) => {
    const shop = state.userData.franchiseList.find(s => s.franchise_id === val);
    state.userData.franchise_id = shop.franchise_id;
    state.userData.franchise_name = shop.name;
    state.userData.franchise_lineid = shop.franchise_lineid;
    addBubble('user', shop.name);
    await stepFetchCalendar();
  });
}

// ===== Step 8: 日程選択 =====
async function stepFetchCalendar() {
  setProgress(8);
  showTyping();

  const data = await callAPI({
    action: 'get_calendar',
    lineId: state.lineId,
    franchise_id: state.userData.franchise_id
  });
  removeTyping();

  if (!data || !data.date || data.date.length === 0) {
    addBubble('bot', '現在この加盟店の空き枠がありません。別の加盟店をお選びください。');
    await delay(300);
    stepAskPrefecture();
    return;
  }

  state.userData.calendarSlots = data.date.filter(Boolean);
  state.userData.selectedDates = [];

  addBubble('bot', '希望日時を最大3つ選択してください（優先順位順）。\n選択後「確定」を押してください。');
  addSlotSelect(state.userData.calendarSlots, (dates) => {
    state.userData.selectedDates = dates;
    addBubble('user', `第1希望：${dates[0]}${dates[1] ? '\n第2希望：'+dates[1] : ''}${dates[2] ? '\n第3希望：'+dates[2] : ''}`);
    stepShowForm();
  });
}

// ===== Step 10: 予約送信 =====
async function submitReserve() {
  const name = document.getElementById('f_name').value.trim();
  const tel = document.getElementById('f_tel').value.trim();
  const postcode = document.getElementById('f_postcode').value.trim();
  const address = document.getElementById('f_address').value.trim();

  if (!name || !tel || !postcode || !address) {
    showToast('必須項目を入力してください');
    return;
  }

  const btn = document.querySelector('.submit-btn');
  btn.disabled = true;
  btn.textContent = '送信中...';

  const body = {
    action: 'submit_reserve',
    lineId: state.lineId,
    name,
    tel,
    email: document.getElementById('f_email').value.trim(),
    postcode,
    address,
    parking: document.getElementById('f_parking').value,
    // Logic Apps のフィールド名に合わせる
    used: state.userData.used,
    symptoms: state.userData.symptoms,
    model_type: state.userData.type,      // cra25_macinetype
    model_number: state.userData.model_number, // cra25_macinecode
    franchise_id: state.userData.franchise_id,
    request1: state.userData.selectedDates[0] || '',
    request2: state.userData.selectedDates[1] || '',
    request3: state.userData.selectedDates[2] || ''
  };

  setProgress(10);
  const result = await callAPI(body);

  if (result && result.result === 'success') {
    // 確定日時の表示
    const completeEl = document.getElementById('complete');
    if (result.datetime) {
      const parsed = parseDatetime(result.datetime);
      if (parsed) {
        const dtDiv = document.createElement('div');
        dtDiv.style.cssText = 'background:var(--primary-light);border:1.5px solid var(--primary);border-radius:10px;padding:12px 16px;text-align:left;width:100%;max-width:320px;';
        dtDiv.innerHTML = `
          <div style="font-size:11px;font-weight:700;color:var(--primary-dark);margin-bottom:6px;">📅 確定日時</div>
          <div style="font-size:15px;font-weight:700;color:var(--text);">${parsed.display}</div>
          ${parsed.shopName ? `<div style="font-size:12px;color:var(--text-muted);margin-top:3px;">担当：${parsed.shopName}</div>` : ''}
        `;
        // complete の p タグの後に挿入
        const pTag = completeEl.querySelector('p');
        if (pTag && pTag.nextSibling) {
          completeEl.insertBefore(dtDiv, pTag.nextSibling);
        } else {
          completeEl.appendChild(dtDiv);
        }
      }
    }
    document.getElementById('chat').style.display = 'none';
    completeEl.style.display = 'flex';
  } else {
    btn.disabled = false;
    btn.textContent = '予約を確定する';
    showToast('予約の送信に失敗しました。もう一度お試しください。');
  }
}

// ===== ユーティリティ: 確定日時文字列を解析 =====
// 例: "ピカまる加盟店_2026-03-01_18:00" → { shopName, date, time, display }
function parseDatetime(datetimeStr) {
  if (!datetimeStr) return null;
  // 後ろから _HH:MM と _YYYY-MM-DD を切り出す
  const parts = datetimeStr.split('_');
  if (parts.length < 3) return { shopName: datetimeStr, date: '', time: '', display: datetimeStr };
  const time = parts[parts.length - 1];   // "18:00"
  const date = parts[parts.length - 2];   // "2026-03-01"
  const shopName = parts.slice(0, parts.length - 2).join('_');

  // 日付フォーマット: "2026-03-01" → "2026年3月1日"
  let dateDisplay = date;
  const dm = date.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (dm) {
    dateDisplay = `${dm[1]}年${parseInt(dm[2])}月${parseInt(dm[3])}日`;
  }

  return {
    shopName,
    date,
    time,
    display: `${dateDisplay} ${time}`
  };
}


function addBubble(type, text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `bubble ${type}`;
  div.innerHTML = text.replace(/\n/g, '<br>');
  chat.appendChild(div);
  scrollBottom();
}

function addButtons(items, callback) {
  const chat = document.getElementById('chat');
  const group = document.createElement('div');
  group.className = 'btn-group';

  items.forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = item.label + (item.sub ? `<br><small style="color:#888;font-weight:400">${item.sub}</small>` : '');
    btn.onclick = () => {
      // ボタン全無効化
      group.querySelectorAll('button').forEach(b => b.disabled = true);
      btn.classList.add('selected');
      callback(item.value);
    };
    group.appendChild(btn);
  });

  chat.appendChild(group);
  scrollBottom();
}

function addScrollSelect(items, callback) {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = 'input-form';
  wrap.style.alignSelf = 'stretch';

  const sel = document.createElement('select');
  sel.style.cssText = 'width:100%;border:1.5px solid #e0e0e0;border-radius:8px;padding:9px 12px;font-size:14px;font-family:inherit;outline:none;';
  sel.innerHTML = '<option value="">都道府県を選択...</option>' +
    items.map(p => `<option value="${p}">${p}</option>`).join('');

  const btn = document.createElement('button');
  btn.className = 'submit-btn';
  btn.style.marginTop = '10px';
  btn.textContent = '次へ';
  btn.onclick = () => {
    if (!sel.value) { showToast('都道府県を選択してください'); return; }
    sel.disabled = true;
    btn.disabled = true;
    callback(sel.value);
  };

  wrap.appendChild(sel);
  wrap.appendChild(btn);
  chat.appendChild(wrap);
  scrollBottom();
}

function addMultiSelect(items, callback) {
  const chat = document.getElementById('chat');
  const group = document.createElement('div');
  group.className = 'btn-group';
  group.style.maxWidth = '100%';

  const selected = new Set();

  items.forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = item;
    btn.onclick = () => {
      if (selected.has(item)) {
        selected.delete(item);
        btn.classList.remove('selected');
      } else {
        selected.add(item);
        btn.classList.add('selected');
      }
    };
    group.appendChild(btn);
  });

  const nextBtn = document.createElement('button');
  nextBtn.className = 'submit-btn';
  nextBtn.textContent = '次へ →';
  nextBtn.onclick = () => {
    if (selected.size === 0) { showToast('1つ以上選択してください'); return; }
    group.querySelectorAll('button').forEach(b => b.disabled = true);
    callback([...selected]);
  };
  group.appendChild(nextBtn);
  chat.appendChild(group);
  scrollBottom();
}

function addSlotSelect(slots, callback) {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.style.cssText = 'align-self:stretch;animation:fadeIn 0.25s ease;';

  const selected = []; // 最大3件
  const btnMap = {};

  const grid = document.createElement('div');
  grid.style.cssText = 'display:flex;flex-direction:column;gap:6px;';

  slots.forEach(slot => {
    const btn = document.createElement('button');
    btn.className = 'slot-btn';
    btn.innerHTML = `<span class="slot-num" style="display:none">?</span>${slot}`;
    btnMap[slot] = btn;

    btn.onclick = () => {
      const idx = selected.indexOf(slot);
      if (idx >= 0) {
        // 選択解除
        selected.splice(idx, 1);
        btn.className = 'slot-btn';
        btn.querySelector('.slot-num').style.display = 'none';
        btn.querySelector('.slot-num').textContent = '?';
        // 番号を振り直す
        selected.forEach((s, i) => {
          const b = btnMap[s];
          b.querySelector('.slot-num').textContent = i + 1;
          b.className = `slot-btn selected-${i+1}`;
          b.querySelector('.slot-num').style.display = 'inline-block';
        });
      } else if (selected.length < 3) {
        selected.push(slot);
        const n = selected.length;
        btn.className = `slot-btn selected-${n}`;
        btn.querySelector('.slot-num').textContent = n;
        btn.querySelector('.slot-num').style.display = 'inline-block';
      }

      confirmBtn.disabled = selected.length === 0;
    };
    grid.appendChild(btn);
  });

  const confirmBtn = document.createElement('button');
  confirmBtn.className = 'submit-btn';
  confirmBtn.style.marginTop = '10px';
  confirmBtn.textContent = '日程を確定する';
  confirmBtn.disabled = true;
  confirmBtn.onclick = () => {
    if (selected.length === 0) { showToast('日程を選択してください'); return; }
    grid.querySelectorAll('button').forEach(b => b.disabled = true);
    confirmBtn.disabled = true;
    callback([...selected]);
  };

  wrap.appendChild(grid);
  wrap.appendChild(confirmBtn);
  chat.appendChild(wrap);
  scrollBottom();
}

function addTextInput(placeholder, required, callback) {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;gap:8px;align-self:stretch;animation:fadeIn 0.25s ease;';

  const input = document.createElement('input');
  input.placeholder = placeholder;
  input.style.cssText = 'flex:1;border:1.5px solid #e0e0e0;border-radius:22px;padding:9px 14px;font-size:14px;font-family:inherit;outline:none;';
  input.addEventListener('focus', () => input.style.borderColor = 'var(--primary)');
  input.addEventListener('blur', () => input.style.borderColor = '#e0e0e0');

  const btn = document.createElement('button');
  btn.textContent = '→';
  btn.style.cssText = 'background:var(--primary);color:white;border:none;border-radius:50%;width:40px;height:40px;font-size:18px;cursor:pointer;flex-shrink:0;';
  btn.onclick = () => {
    const val = input.value.trim();
    if (required && !val) { showToast('入力してください'); return; }
    input.disabled = true;
    btn.disabled = true;
    callback(val || 'わからない');
  };

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') btn.click();
  });

  wrap.appendChild(input);
  wrap.appendChild(btn);
  chat.appendChild(wrap);
  scrollBottom();
  setTimeout(() => input.focus(), 300);
}

function showTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.id = 'typing';
  div.className = 'typing';
  div.innerHTML = '<span></span><span></span><span></span>';
  chat.appendChild(div);
  scrollBottom();
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function setProgress(step) {
  state.step = step;
  document.getElementById('progress-fill').style.width = `${(step / TOTAL_STEPS) * 100}%`;
}

function scrollBottom() {
  setTimeout(() => {
    const c = document.getElementById('chat');
    if (c) c.scrollTop = c.scrollHeight;
  }, 50);
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ===== 起動 =====
init();
