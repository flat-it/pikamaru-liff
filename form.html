<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="env.js"></script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body { margin:0; font-family:sans-serif; background:#e5ddd5; }
#chat { padding:10px; height:90vh; overflow-y:auto; }
.message { max-width:75%; margin:10px; padding:10px; border-radius:10px; }
.bot { background:#fff; }
.user { background:#dcf8c6; margin-left:auto; }

#inputArea { position:fixed; bottom:0; width:100%; display:flex; background:#fff; }
input { flex:1; padding:10px; }

.btn {
  display:block;
  margin:5px 0;
  padding:10px;
  background:#4CAF50;
  color:white;
  border:none;
  border-radius:5px;
}
.btn.selected { background:#ff9800; }
</style>
</head>

<body>

<div id="chat"></div>

<div id="inputArea">
<input id="input">
<button onclick="send()">送信</button>
</div>

<script>

// ================= URL制御 =================
const params = new URLSearchParams(location.search);
const isForceNew = params.get("mode") === "new";
const isRe = params.get("mode") === "re";
const reserveId = params.get("reserveid");

// ================= 状態 =================
let step=0;
let userData={};
let userId="";
let makerData=[];
let selectedDates=[];
let calendarSlots=[];

// ================= API =================
async function callAPI(action, body={}){
  try{
    const res = await fetch(ENV.API_BASE,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({action,...body})
    });

    if(!res.ok) throw new Error();

    return await res.json();

  }catch(e){
    ask("通信エラーが発生しました");

    showButtons(["やり直す"],()=>location.reload());

    throw e;
  }
}

// ================= LIFF =================
async function init(){

  await liff.init({ liffId: ENV.LIFF_ID });

  if(!liff.isLoggedIn()){
    liff.login();
    return;
  }

  const profile = await liff.getProfile();
  userId = profile.userId;

  const visit = await callAPI("check_visit",{lineId:userId});

  if(!visit) return;

  if(!visit.isFirstVisit && !isForceNew && !isRe){
    location.href="index.html";
    return;
  }

  await fetchMaker();

  // ================= 再予約 =================
  if(isRe && reserveId){
    loadReserveForRe();
    return;
  }

  ask("こんにちは！予約を開始します");
  handleStep("");
}

// ================= 再予約ロード =================
async function loadReserveForRe(){

  addMessage("前回の予約内容を読み込んでいます...");

  const data = await callAPI("get_reserve_detail",{
    lineId:userId,
    reserveid:reserveId
  });

  if(!data || !data.reserve){
    ask("履歴の取得に失敗しました");
    return;
  }

  userData = {
    name: data.reserve.name,
    pref: data.reserve.pref,
    maker: data.reserve.maker,
    type: data.reserve.type,
    franchise_id: data.reserve.franchise_id,
    shop: data.reserve.shop
  };

  ask(`前回の内容を元に再予約します

名前：${userData.name}
地域：${userData.pref}
加盟店：${userData.shop}
メーカー：${userData.maker}

日時を選択してください`);

  fetchCalendar();
}

// ================= メーカー =================
async function fetchMaker(){
  const data = await callAPI("check_maker");
  makerData = data?.items || [];
}

// ================= UI =================
function addMessage(text,type="bot"){
  const div=document.createElement("div");
  div.className="message "+type;
  div.innerText=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function ask(text){
  setTimeout(()=>addMessage(text),300);
}

function showButtons(list,callback){
  const div=document.createElement("div");
  div.className="message bot";

  list.forEach(v=>{
    const b=document.createElement("button");
    b.className="btn";
    b.innerText=v;

    b.onclick=()=>{
      addMessage(v,"user");
      callback(v);
    };

    div.appendChild(b);
  });

  chat.appendChild(div);
}

// ================= 入力 =================
function send(){
  const val=input.value;
  if(!val) return;
  addMessage(val,"user");
  input.value="";
  handleStep(val);
}

// ================= ステップ =================
function handleStep(val){

switch(step){

case 0:
  ask("お名前を教えてください");
  step=1;
  break;

case 1:
  userData.name=val;
  showPref();
  step=2;
  break;

case 2:
  userData.pref=val;
  showMaker();
  step=3;
  break;

case 4:
  userData.model=val;
  fetchShops();
  step=5;
  break;
}
}

// ================= 都道府県 =================
function showPref(){
  showButtons(["東京","神奈川","千葉","埼玉","静岡","愛知"],v=>{
    handleStep(v);
  });
}

// ================= メーカー =================
function showMaker(){
  const makers=[...new Set(makerData.map(m=>m.maker))];

  showButtons(makers,v=>{
    userData.maker=v;
    showPattern(v);
  });
}

function showPattern(maker){
  const list = makerData.filter(m=>m.maker===maker);

  showButtons(list.map(x=>x.pattern),v=>{
    const m = list.find(x=>x.pattern===v);
    userData.type=m.type;
    ask("型番を入力してください（任意）");
    step=4;
  });
}

// ================= 加盟店 =================
async function fetchShops(){

  const data = await callAPI("get_franchise",{
    prefecture:userData.pref,
    type:userData.type
  });

  if(!data.items || data.items.length===0){
    ask("対応可能な加盟店がありません");

    showButtons(["戻る"],()=>location.reload());
    return;
  }

  showButtons(data.items.map(x=>x.name),v=>{
    const shop=data.items.find(x=>x.name===v);
    userData.franchise_id=shop.franchise_id;
    userData.shop=shop.name;

    fetchCalendar();
  });
}

// ================= カレンダー =================
async function fetchCalendar(){

  const data = await callAPI("get_calendar",{
    franchise_id:userData.franchise_id
  });

  if(!data.date || data.date.length===0){
    ask("空きがありません");

    showButtons(["加盟店変更"],()=>fetchShops());
    return;
  }

  calendarSlots=data.date;

  ask("希望日時を3つ選択してください");

  const div=document.createElement("div");
  div.className="message bot";

  calendarSlots.forEach(slot=>{
    const b=document.createElement("button");
    b.className="btn";
    b.innerText=slot;

    b.onclick=()=>{
      if(selectedDates.includes(slot)){
        selectedDates=selectedDates.filter(x=>x!==slot);
        b.classList.remove("selected");
      }else{
        if(selectedDates.length>=3){
          alert("3つまで");
          return;
        }
        selectedDates.push(slot);
        b.classList.add("selected");
      }

      if(selectedDates.length===3){
        userData.date1=selectedDates[0];
        userData.date2=selectedDates[1];
        userData.date3=selectedDates[2];
        confirm();
      }
    };

    div.appendChild(b);
  });

  chat.appendChild(div);
}

// ================= 確認 =================
function confirm(){

  ask(`以下で予約しますか？
名前:${userData.name}
加盟店:${userData.shop}
1:${userData.date1}
2:${userData.date2}
3:${userData.date3}`);

  showButtons(["はい","いいえ"],v=>{
    if(v==="はい") submit();
    else location.reload();
  });
}

// ================= 送信 =================
async function submit(){

  addMessage("予約中...");

  const res = await callAPI("submit_reserve",{
    lineId:userId,
    name:userData.name,
    franchise_id:userData.franchise_id,
    model_type:userData.type,
    request1:userData.date1,
    request2:userData.date2,
    request3:userData.date3
  });

  if(res.result==="success"){
    ask("予約完了！");
    setTimeout(()=>location.href="index.html",1500);
  }else{
    ask("失敗しました");
  }
}

init();

</script>

</body>
</html>
